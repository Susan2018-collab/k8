apiVersion: apps/v1
kind: Deployment
metadata: 
  name: nginx-deployment
  namespace: prod
spec:
 replicas: 2
 selector:
  matchLabels:
   app: nginx
 template:
  metadata:
   labels:
    app: nginx
  spec:
   containers:
   - name: nginx 
     image: nginx:stable
     ports:
     - containerPort: 80
     volumeMounts:
       - name: nginx-config-volume
         mountPath: /etc/nginx/conf.d/default.conf
         subPath: default.conf
     readinessProbe:
      httpGet:
       path: /
       port: 80
      initialDelaySeconds: 5
      periodSeconds: 5
     livenessProbe:
      httpGet:
       path: /
       port: 80
      initialDelaySeconds: 5
   volumes:
     - name: nginx-config-volume
       configMap:
         name: nginx-config
